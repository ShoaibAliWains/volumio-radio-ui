<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio UI</title>
    <style>
        body {
            background-color: #121212; color: white;
            font-family: sans-serif; margin: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; /* Fits the screen */
            overflow: hidden;
        }
        .container { text-align: center; width: 100%; max-width: 720px; }
        .controls button {
            background: #1DB954; color: white; border: none;
            padding: 20px; font-size: 24px; border-radius: 50%;
            margin: 10px; cursor: pointer;
        }
        #station-name { font-size: 32px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="station-name">Loading Station...</h1>
        <div class="controls">
            <button onclick="alert('Volumio Prev')">⏮</button>
            <button onclick="alert('Volumio Play/Pause')">⏯</button>
            <button onclick="alert('Volumio Next')">⏭</button>
        </div>
        <p>Wi-Fi: Connected | Bluetooth: Ready</p>
    </div>
</body>
</html>
