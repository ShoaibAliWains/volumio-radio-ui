<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio La Voix Divine</title>
    <style>
        /* Locked perfectly to HyperPixel 4.0 Resolution */
        body {
            background-color: #0f172a; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            width: 720px; 
            height: 720px; 
            overflow: hidden;
        }
        .container { 
            text-align: center; 
            width: 90%; 
        }
        .logo {
            width: 200px;
            height: 200px;
            background: #1e293b;
            border-radius: 20px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        #station-name { 
            font-size: 42px; 
            font-weight: bold;
            margin-bottom: 10px; 
        }
        #stream-status {
            font-size: 20px;
            color: #10b981; /* Green color for active */
            margin-bottom: 40px;
        }
        .controls button {
            background: #3b82f6; 
            color: white; 
            border: none;
            padding: 25px 50px; 
            font-size: 28px; 
            border-radius: 15px;
            margin: 10px; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .controls button:active { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📻</div>
        <div id="station-name">Loading...</div>
        <div id="stream-status">Connecting to stream...</div>
        
        <div class="controls">
            <button onclick="playRadio()">▶ Play Stream</button>
        </div>
    </div>

    <script>
        // Load settings from config.json automatically
        fetch('/api/config')
            .then(response => response.json())
            .then(data => {
                document.getElementById('station-name').innerText = data.station_name;
            });

        // Function to start the audio
        function playRadio() {
            document.getElementById('stream-status').innerText = "Buffering...";
            fetch('/api/play-stream', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if(data.status === "playing") {
                        document.getElementById('stream-status').innerText = "Live: Playing";
                    } else {
                        document.getElementById('stream-status').innerText = "Error playing stream";
                    }
                });
        }

        // Auto-play on load (might be blocked by some browser policies, but good for kiosk)
        setTimeout(playRadio, 3000);
    </script>
</body>
</html>
